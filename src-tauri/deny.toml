# cargo-deny 配置 —— 守住 Apache-2.0 + 上架的「纯宽松」底线。
# 安装:cargo install cargo-deny   运行:cd src-tauri && cargo deny check licenses
#
# 策略:项目是 Apache-2.0,且要静态链接 + 上架 MAS/MS Store/Flathub。
# 因此**只放行宽松许可**;任何 GPL/AGPL/LGPL 都会被标记 —— 它们会传染静态链接的
# 二进制 / 与商店分发不兼容,必须人工审查并移除(见 docs/LEGAL.md 红线表)。

[licenses]
confidence-threshold = 0.9
unused-allowed-license = "allow"
allow = [
  # 宽松许可(可静态链接、可商用上架)
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "IJG",
  "NCSA",
  "ISC",
  "Zlib",
  "MPL-2.0",             # 文件级 copyleft,可链接(改动其文件需公开)
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CC0-1.0",
  "CDLA-Permissive-2.0", # webpki-root-certs root store data, permissive data license
  "Unlicense",
  "BSL-1.0",
]

# ⛔ 故意**不**放行任何 GPL / AGPL / LGPL:
#   - GPL/AGPL:静态链接传染整个二进制,与上架/闭源不兼容。
#   - LGPL:要求可重新链接,静态链接 + App Store DRM 不可行。
# 若某依赖被标为上述许可,请替换为宽松等价物(见 docs/LEGAL.md),
# 例如 imagequant(GPL)→ color_quant(MIT);dssim(AGPL)→ ssimulacra2。

[advisories]
# 默认拉取 RustSec 公告库,有漏洞则报错。
#
# 临时例外(2026-07-02):
# - Tauri 2.11.x 的 Linux WebKitGTK/GTK3 栈仍依赖 gtk-rs GTK3 0.18,上游已标记
#   unmaintained,但当前 Tauri Linux GUI 没有可用的 gtk4-rs 替代切换路径。
# - quick-xml 0.39.4 由 Tauri -> plist -> tauri-utils 引入,只在 Tauri 配置/plist
#   处理链上,不处理用户图片输入。plist 1.9.0 / tauri-utils 2.9.3 当前仍未把
#   quick-xml 升到 patched >=0.41.0。
# - paste / proc-macro-error / unic-* 为上游 Tauri 或 libavif/rav1e 构建链的
#   unmaintained advisory,当前无直接可替换版本。
# 这些 ID 必须与 scripts/audit-rust-advisories.mjs 同步;出现可升级上游版本时删除。
ignore = [
  "RUSTSEC-2024-0370",
  "RUSTSEC-2024-0411",
  "RUSTSEC-2024-0412",
  "RUSTSEC-2024-0413",
  "RUSTSEC-2024-0414",
  "RUSTSEC-2024-0415",
  "RUSTSEC-2024-0416",
  "RUSTSEC-2024-0417",
  "RUSTSEC-2024-0418",
  "RUSTSEC-2024-0419",
  "RUSTSEC-2024-0420",
  "RUSTSEC-2024-0436",
  "RUSTSEC-2025-0075",
  "RUSTSEC-2025-0080",
  "RUSTSEC-2025-0081",
  "RUSTSEC-2025-0098",
  "RUSTSEC-2025-0100",
  "RUSTSEC-2026-0194",
  "RUSTSEC-2026-0195",
]
yanked = "deny"

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
