name: Updater Upgrade Smoke

on:
  workflow_dispatch:
    inputs:
      confirm_runner:
        description: Run one GitHub-hosted Ubuntu x86_64 job for the real in-app updater smoke.
        required: true
        default: false
        type: boolean
      from_tag:
        description: Old updater-enabled release tag to launch.
        required: true
        default: v0.1.0
        type: string
      to_tag:
        description: Expected latest updater version.
        required: true
        default: v0.1.1
        type: string

permissions:
  contents: read

concurrency:
  group: updater-upgrade-smoke-${{ inputs.from_tag }}-${{ inputs.to_tag }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"

jobs:
  linux-x86_64:
    name: Linux x86_64 In-App Updater
    if: ${{ inputs.confirm_runner }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            xdotool \
            imagemagick \
            libgtk-3-0 \
            libwebkit2gtk-4.1-0 \
            libayatana-appindicator3-1 \
            librsvg2-2 \
            libasound2t64
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Real in-app updater smoke
        run: |
          node scripts/smoke-tauri-in-app-updater.mjs \
            --repo="${{ github.repository }}" \
            --from-tag="${{ inputs.from_tag }}" \
            --to-tag="${{ inputs.to_tag }}" \
            --platform=linux-x86_64 \
            --require-gui
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: updater-upgrade-smoke-${{ inputs.from_tag }}-${{ inputs.to_tag }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            target/updater-upgrade-smoke/*.png
