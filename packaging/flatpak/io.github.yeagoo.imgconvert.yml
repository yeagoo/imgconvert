# SPDX-License-Identifier: Apache-2.0

app-id: io.github.yeagoo.imgconvert
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
  - org.freedesktop.Sdk.Extension.rust-stable
command: imgconvert

build-options:
  append-path: /run/build/imgconvert/.flatpak-corepack-bin:/usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin
  env:
    CARGO_NET_OFFLINE: "true"
    CI: "true"
    COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
    COREPACK_HOME: /run/build/imgconvert/.flatpak-corepack
    IMGCONVERT_ALLOW_FLATPAK_CODEC_EXTENSIONS: "1"
    IMGCONVERT_DISABLE_EXTERNAL_CODECS: "1"
    PNPM_HOME: /run/build/imgconvert/.pnpm-home

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --env=IMGCONVERT_ALLOW_FLATPAK_CODEC_EXTENSIONS=1
  - --env=IMGCONVERT_DISABLE_EXTERNAL_CODECS=1

add-extensions:
  io.github.yeagoo.imgconvert.Codecs:
    version: "1"
    directory: extensions/codecs
    add-ld-path: lib
    subdirectories: true
    no-autodownload: true
    autodelete: true

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man

cleanup-commands:
  - mkdir -p ${FLATPAK_DEST}/extensions/codecs

modules:
  - name: imgconvert
    buildsystem: simple
    build-commands:
      - mkdir -p .flatpak-corepack-bin
      - corepack enable --install-directory .flatpak-corepack-bin
      - corepack install -g --cache-only .flatpak-vendor/corepack.tgz
      - pnpm install --offline --frozen-lockfile --store-dir .flatpak-vendor/pnpm-store
      - pnpm run build
      - cargo build --release --locked --offline --manifest-path src-tauri/Cargo.toml
      - install -Dm755 src-tauri/target/release/imgconvert /app/bin/imgconvert
      - install -Dm644 packaging/flatpak/io.github.yeagoo.imgconvert.desktop /app/share/applications/io.github.yeagoo.imgconvert.desktop
      - install -Dm644 packaging/flatpak/io.github.yeagoo.imgconvert.metainfo.xml /app/share/metainfo/io.github.yeagoo.imgconvert.metainfo.xml
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/io.github.yeagoo.imgconvert.png
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/io.github.yeagoo.imgconvert.png
      - install -Dm644 LICENSE /app/share/licenses/imgconvert/LICENSE
      - install -Dm644 NOTICE /app/share/doc/imgconvert/NOTICE
      - install -Dm644 THIRD_PARTY_LICENSES.md /app/share/doc/imgconvert/THIRD_PARTY_LICENSES.md
    sources:
      - type: archive
        path: ../../target/flatpak/sources/imgconvert-0.1.1-source.tar.gz
        sha256: ead8f136896ee81b452d4b3ed4391da5453ca93b3f3499c7ec4a495d0cba8f5b
