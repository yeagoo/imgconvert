# SPDX-License-Identifier: Apache-2.0

app-id: com.ivmm.imgconvert
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
  - org.freedesktop.Sdk.Extension.rust-stable
command: imgconvert

build-options:
  append-path: /run/build/imgconvert/.flatpak-corepack-bin:/usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin
  env:
    CARGO_NET_OFFLINE: "true"
    COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
    COREPACK_HOME: /run/build/imgconvert/.flatpak-corepack
    IMGCONVERT_DISABLE_EXTERNAL_CODECS: "1"
    PNPM_HOME: /run/build/imgconvert/.pnpm-home

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --env=IMGCONVERT_DISABLE_EXTERNAL_CODECS=1

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man

modules:
  - name: imgconvert
    buildsystem: simple
    build-commands:
      - mkdir -p .flatpak-corepack-bin
      - corepack enable --install-directory .flatpak-corepack-bin
      - corepack install -g --cache-only .flatpak-vendor/corepack.tgz
      - pnpm install --offline --frozen-lockfile --store-dir .flatpak-vendor/pnpm-store
      - pnpm run build
      - cargo build --release --locked --offline --manifest-path src-tauri/Cargo.toml
      - install -Dm755 src-tauri/target/release/imgconvert /app/bin/imgconvert
      - install -Dm644 packaging/flatpak/com.ivmm.imgconvert.desktop /app/share/applications/com.ivmm.imgconvert.desktop
      - install -Dm644 packaging/flatpak/com.ivmm.imgconvert.metainfo.xml /app/share/metainfo/com.ivmm.imgconvert.metainfo.xml
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/com.ivmm.imgconvert.png
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.ivmm.imgconvert.png
      - install -Dm644 LICENSE /app/share/licenses/imgconvert/LICENSE
      - install -Dm644 NOTICE /app/share/doc/imgconvert/NOTICE
      - install -Dm644 THIRD_PARTY_LICENSES.md /app/share/doc/imgconvert/THIRD_PARTY_LICENSES.md
    sources:
      - type: archive
        path: ../../target/flatpak/sources/imgconvert-0.1.0-source.tar.gz
        sha256: 65354d0baed7bbe2734e55080ab0626cad240fd3cccc1ce8658d6c2ba830ecb6
